<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EMDTrack">
<title>EMDTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"]{
  --bg:#060a12;--surface:#0d1420;--card:#111c2e;--card2:#162338;
  --border:#1e3050;--border2:#254068;
  --text:#f0f6ff;--dim:#6080a8;--muted:#0a1220;
  --accent:#3b9eff;--accent2:#70bbff;--glow:rgba(59,158,255,.22);
  --grad1:rgba(59,130,246,.14);--grad2:rgba(16,185,129,.07);--grad3:rgba(99,102,241,.05);
}
[data-theme="light"]{
  --bg:#eef2f9;--surface:#ffffff;--card:#ffffff;--card2:#f4f7fd;
  --border:#c8d8ee;--border2:#a8bcd8;
  --text:#0a1a2e;--dim:#5070a0;--muted:#dde8f8;
  --accent:#1a7dff;--accent2:#0056cc;--glow:rgba(26,125,255,.18);
  --grad1:rgba(59,130,246,.07);--grad2:rgba(16,185,129,.04);--grad3:rgba(99,102,241,.03);
}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  transition:background .2s,color .2s;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%,var(--grad1) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,var(--grad2) 0%,transparent 55%),
    radial-gradient(ellipse 30% 30% at 10% 60%,var(--grad3) 0%,transparent 50%);}

/* HEADER */
header{position:sticky;top:0;z-index:50;
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);padding:0 16px;padding-top:var(--safe-top);
  transition:background .2s,border-color .2s;}
[data-theme="dark"] header{background:rgba(6,10,18,.9);box-shadow:0 1px 30px rgba(0,0,0,.6);}
[data-theme="light"] header{background:rgba(238,242,249,.92);box-shadow:0 1px 16px rgba(0,0,0,.08);}
.hdr-row1{display:flex;align-items:center;height:48px;gap:8px;}
.hdr-row2{display:flex;align-items:center;height:40px;gap:6px;padding-bottom:6px;}
.btn-back{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;padding:7px 11px;color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;text-decoration:none;transition:all .15s;}
.btn-back:hover{color:var(--accent);border-color:rgba(59,158,255,.4);}
.brand{display:flex;align-items:center;gap:9px;flex:1;min-width:0;font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);letter-spacing:.3px;}
.brand-pip{width:26px;height:26px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#047857,#34d399);
  display:flex;align-items:center;justify-content:center;font-size:13px;
  box-shadow:0 0 14px rgba(52,211,153,.4),inset 0 1px 0 rgba(255,255,255,.25);}
.hdr-search{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border2);
  border-radius:10px;padding:8px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s,background .2s;}
.hdr-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.hdr-search::placeholder{color:var(--dim);}
.btn-theme{width:32px;height:32px;border-radius:9px;border:1px solid var(--border2);background:var(--surface);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background .2s,border-color .2s;-webkit-appearance:none;}
.btn-theme:active{transform:scale(.9);}

/* SYNC */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--border2);transition:background .3s;}
.sync-dot.ok{background:#34d399;box-shadow:0 0 6px #34d39977;}
.sync-dot.err{background:#f87171;box-shadow:0 0 6px #f8717177;}
.sync-dot.busy{background:#fbbf24;box-shadow:0 0 6px #fbbf2477;animation:pulse .8s infinite;}
.btn-sync{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;padding:7px 11px;color:var(--dim);font-family:var(--sans);font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;transition:all .15s;}
.btn-sync.ok{color:#34d399;border-color:rgba(52,211,153,.4);}
.btn-add{background:linear-gradient(135deg,#047857,#34d399);border:none;border-radius:9px;
  padding:8px 16px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;margin-left:auto;
  box-shadow:0 0 12px rgba(52,211,153,.3);transition:opacity .15s;}
.btn-add:active{opacity:.85;}

/* MAIN */
main{padding:16px;padding-bottom:calc(30px + var(--safe-bot));}

/* STATS */
.stats-row{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:9px 14px;font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0;
  transition:background .2s;}
.stat-chip b{font-size:14px;}
.stat-chip.green b{color:#34d399;}
[data-theme="light"] .stat-chip.green b{color:#047857;}
.stat-chip.amber b{color:#fbbf24;}
[data-theme="light"] .stat-chip.amber b{color:#b45309;}
.stat-chip.blue b{color:var(--accent2);}
.stat-chip.red b{color:#f87171;}
[data-theme="light"] .stat-chip.red b{color:#dc2020;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{background:var(--surface);border:1px solid var(--border2);border-radius:20px;
  padding:6px 14px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--dim);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 0 12px var(--glow);}

/* EMD CARDS */
.emd-list{display:flex;flex-direction:column;gap:10px;}
.emd-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;overflow:hidden;
  transition:border-color .15s;}
[data-theme="light"] .emd-card{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.emd-card:hover{border-color:rgba(59,158,255,.35);}
.emd-card-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.emd-no{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);flex:1;}
.emd-vendor{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;}
.emd-amount{font-family:var(--mono);font-size:13px;font-weight:700;color:#34d399;white-space:nowrap;}
[data-theme="light"] .emd-amount{color:#047857;}
.emd-status{font-size:10px;font-weight:700;font-family:var(--mono);border-radius:20px;padding:3px 10px;white-space:nowrap;}
.emd-status.refund-pending{background:rgba(59,158,255,.15);color:#70bbff;border:1px solid rgba(59,158,255,.3);}
[data-theme="light"] .emd-status.refund-pending{background:rgba(26,125,255,.1);color:#1255a0;border-color:rgba(26,125,255,.3);}
.emd-status.refund-requested{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
[data-theme="light"] .emd-status.refund-requested{background:rgba(180,83,9,.1);color:#92400e;border-color:rgba(180,83,9,.3);}
.emd-status.refunded{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25);}
[data-theme="light"] .emd-status.refunded{background:rgba(4,120,87,.1);color:#047857;border-color:rgba(4,120,87,.3);}
.emd-chevron{color:var(--dim);font-size:16px;flex-shrink:0;transition:transform .2s;}
.emd-card.expanded .emd-chevron{transform:rotate(180deg);}

/* EMD HISTORY */
.emd-history{border-top:1px solid var(--border);padding:0 14px 12px;}
.emd-history-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  font-family:var(--mono);color:var(--accent);padding:10px 0 8px;}
.emd-entry{display:flex;flex-direction:column;gap:4px;background:var(--card);border:1px solid var(--border2);
  border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;}
[data-theme="light"] .emd-entry{background:var(--card2);}
.emd-entry:last-child{margin-bottom:0;}
.emd-entry:hover{border-color:rgba(59,158,255,.35);}
.emd-entry-row{display:flex;align-items:center;gap:8px;}
.emd-entry-amount{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);}
.emd-entry-date{font-family:var(--mono);font-size:11px;color:var(--dim);flex:1;}
.emd-entry-notes{font-size:12px;color:var(--dim);line-height:1.4;margin-top:2px;}
.emd-add-entry{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed var(--border2);
  border-radius:10px;padding:10px 13px;color:var(--dim);font-size:13px;font-family:var(--sans);
  cursor:pointer;width:100%;margin-top:4px;transition:all .15s;}
.emd-add-entry:hover{border-color:var(--accent);color:var(--accent);}

/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--dim);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.25;}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .25s;}
.overlay.open{background:rgba(0,0,0,.55);pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border2);
  border-radius:22px 22px 0 0;padding:20px 20px calc(20px + var(--safe-bot));
  max-height:92vh;overflow-y:auto;width:100%;max-width:600px;margin:0 auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.open .modal{transform:translateY(0);}
[data-theme="dark"] .modal{box-shadow:0 -16px 60px rgba(0,0,0,.7);}
[data-theme="light"] .modal{box-shadow:0 -8px 40px rgba(0,0,0,.12);}
.modal-drag{width:40px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 20px;}
.mt{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);letter-spacing:.2px;}
.xbtn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--dim);-webkit-appearance:none;}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.fi{background:var(--surface);border:1px solid var(--border2);border-radius:11px;padding:11px 13px;
  color:var(--text);font-family:var(--sans);font-size:15px;outline:none;width:100%;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s,background .2s;}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow);}
.fl{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:6px;display:block;font-family:var(--mono);}
.fgrp{margin-bottom:14px;}
.fsec{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent);
  font-family:var(--mono);padding:12px 0 8px;border-top:1px solid var(--border);}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.btn-c{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;
  color:var(--dim);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;-webkit-appearance:none;}
.btn-s{background:linear-gradient(135deg,#047857,#34d399);border:1px solid rgba(52,211,153,.3);border-radius:10px;
  padding:10px 20px;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;
  box-shadow:0 0 14px rgba(52,211,153,.25);}

/* Status selector */
.status-opts{display:flex;gap:8px;flex-wrap:wrap;}
.sopt{flex:1;min-width:90px;border:1px solid var(--border2);border-radius:10px;padding:10px 8px;
  text-align:center;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--dim);background:var(--surface);transition:all .15s;}
.sopt.active-refund-pending{background:rgba(59,158,255,.15);border-color:rgba(59,158,255,.5);color:#70bbff;}
[data-theme="light"] .sopt.active-refund-pending{background:rgba(26,125,255,.1);border-color:rgba(26,125,255,.4);color:#1255a0;}
.sopt.active-refund-requested{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.5);color:#fbbf24;}
[data-theme="light"] .sopt.active-refund-requested{background:rgba(180,83,9,.1);border-color:rgba(180,83,9,.4);color:#92400e;}
.sopt.active-refunded{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.5);color:#34d399;}
[data-theme="light"] .sopt.active-refunded{background:rgba(4,120,87,.1);border-color:rgba(4,120,87,.4);color:#047857;}

/* SYNC MODAL */
.sync-url-box{background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:10px 13px;font-size:11px;font-family:var(--mono);color:var(--dim);line-height:1.6;
  overflow-x:auto;white-space:pre;cursor:pointer;position:relative;margin-bottom:10px;}
.btn-push{background:linear-gradient(135deg,#047857,#34d399);border:none;border-radius:10px;
  padding:11px 0;color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;width:100%;margin-bottom:8px;}
.btn-pull{background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:11px 0;color:var(--dim);font-family:var(--sans);font-size:14px;font-weight:500;
  cursor:pointer;width:100%;margin-bottom:8px;}
.sync-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.sync-step-num{width:20px;height:20px;border-radius:50%;background:rgba(52,211,153,.15);
  border:1px solid rgba(52,211,153,.3);display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#34d399;flex-shrink:0;margin-top:1px;}
.sync-step-body{flex:1;font-size:12px;color:var(--dim);line-height:1.5;}

/* EXCEL EXPORT BUTTON */
.btn-excel{display:flex;align-items:center;gap:5px;border-radius:9px;padding:7px 11px;
  font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none;transition:all .15s;}
[data-theme="dark"] .btn-excel{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:#4ade80;}
[data-theme="dark"] .btn-excel:hover{background:rgba(34,197,94,.25);border-color:rgba(34,197,94,.6);}
[data-theme="light"] .btn-excel{background:rgba(4,120,87,.12);border:1px solid rgba(4,120,87,.4);color:#047857;}
[data-theme="light"] .btn-excel:hover{background:rgba(4,120,87,.2);border-color:rgba(4,120,87,.6);}

/* TOAST */
.toast{position:fixed;bottom:calc(24px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--border2);border-radius:12px;
  padding:10px 18px;font-size:13px;font-weight:500;color:var(--text);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{color:#f87171;border-color:rgba(239,68,68,.4);}
</style>
</head>
<body>

<header>
  <div class="hdr-row1">
    <a class="btn-back" href="index.html">← Back</a>
    <div class="brand"><div class="brand-pip">💰</div>EMDTrack</div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button class="btn-add" onclick="openAddTender()">+ Add</button>
  </div>
  <div class="hdr-row2">
    <input class="hdr-search" id="search" placeholder="Search tender, vendor, handled by, amount…" oninput="render()">
    <button class="btn-sync" id="btn-sync" onclick="openSync()">
      <span class="sync-dot" id="sync-dot"></span>Sync
    </button>
    <button class="btn-excel" onclick="exportExcel()" title="Export to Excel">⬇ Excel</button>
  </div>
</header>

<main>
  <div class="stats-row">
    <div class="stat-chip blue"><b id="s-total">0</b>&nbsp;Tenders</div>
    <div class="stat-chip green"><b id="s-amount">₹0</b>&nbsp;Total EMD</div>
    <div class="stat-chip amber"><b id="s-pending">0</b>&nbsp;Refund Pending</div>
    <div class="stat-chip blue"><b id="s-refund-pending">0</b>&nbsp;Refund Pending</div>
    <div class="stat-chip yellow"><b id="s-refund-requested">0</b>&nbsp;Refund Requested</div>
    <div class="stat-chip green"><b id="s-refunded">0</b>&nbsp;Refunded</div>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <div class="ftab active" data-filter="all" onclick="setFilter('all')">All</div>
    <div class="ftab" data-filter="refund-pending" onclick="setFilter('refund-pending')">Refund Pending</div>
    <div class="ftab" data-filter="refund-requested" onclick="setFilter('refund-requested')">Refund Requested</div>
    <div class="ftab" data-filter="refunded" onclick="setFilter('refunded')">Refunded</div>
  </div>

  <div class="emd-list" id="emd-list"></div>
</main>

<!-- ADD/EDIT TENDER MODAL -->
<div class="overlay" id="modal-tender">
  <div class="modal">
    <div class="mhead">
      <span class="mt" id="tender-modal-title">Add Tender</span>
      <button class="xbtn" onclick="closeM('modal-tender')">✕</button>
    </div>
    <div class="fgrp">
      <label class="fl">Tender Number</label>
      <input class="fi" id="f-no" placeholder="e.g. A75 / 19537" autocomplete="off">
    </div>
    <div class="fgrp">
      <label class="fl">Handled By</label>
      <input class="fi" id="f-handled-by-tender" placeholder="e.g. Sandesh, Midhun…" autocomplete="off">
    </div>
    <div class="mfoot">
      <button class="btn-c" onclick="closeM('modal-tender')">Cancel</button>
      <button class="btn-s" onclick="saveTender()">Save</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT EMD ENTRY MODAL -->
<div class="overlay" id="modal-entry">
  <div class="modal">
    <div class="mhead">
      <span class="mt" id="entry-modal-title">Add EMD Entry</span>
      <button class="xbtn" onclick="closeM('modal-entry')">✕</button>
    </div>
    <div class="fgrp">
      <label class="fl">Amount (₹)</label>
      <input class="fi" id="f-amount" type="number" placeholder="e.g. 50000" inputmode="numeric">
    </div>
    <div class="fgrp">
      <label class="fl">Vendor Name</label>
      <input class="fi" id="f-vendor" placeholder="e.g. ABC Pvt Ltd" autocomplete="off">
    </div>
    <div class="fgrp">
      <label class="fl">Payment Date</label>
      <input class="fi" id="f-date" type="date">
    </div>
    <div class="fgrp">
      <label class="fl">Refund Requested On</label>
      <input class="fi" id="f-refund-requested-on" type="date">
    </div>
    <div class="fgrp">
      <label class="fl">Status</label>
      <div class="status-opts" id="status-opts">
        <div class="sopt" data-val="refund-pending" onclick="selectStatus('refund-pending')">Refund Pending</div>
        <div class="sopt" data-val="refund-requested" onclick="selectStatus('refund-requested')">Refund Requested</div>
        <div class="sopt" data-val="refunded" onclick="selectStatus('refunded')">Refunded</div>
      </div>
    </div>
    <div class="fgrp">
      <label class="fl">Notes (optional)</label>
      <input class="fi" id="f-notes" placeholder="e.g. UTR no., reference…" autocomplete="off">
    </div>
    <div class="mfoot">
      <button class="btn-c" id="entry-del-btn" onclick="deleteEntry()" style="margin-right:auto;color:#f87171;border-color:rgba(239,68,68,.3);display:none">Delete</button>
      <button class="btn-c" onclick="closeM('modal-entry')">Cancel</button>
      <button class="btn-s" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- SYNC MODAL -->
<div class="overlay" id="modal-sync">
  <div class="modal">
    <div class="mhead">
      <span class="mt">☁ Cloud Sync</span>
      <button class="xbtn" onclick="closeM('modal-sync')">✕</button>
    </div>
    <div id="sync-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── THEME ─────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('tt_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('btn-theme');
  if(btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('tt_theme', next);
  document.getElementById('btn-theme').textContent = next === 'dark' ? '🌙' : '☀️';
}

// ── CONSTANTS ──────────────────────────────────────────
// -- CONSTANTS -------------------------------------------------
const KEY       = 'emd_v1';
const SYNC_KEY  = 'emd_sync_cfg';

// -- STATE -------------------------------------------------------
let tenders = [];
let activeFilter = 'all';
let editingTenderId = null;
let editingEntryTenderId = null;
let editingEntryId = null;
let selectedStatus = 'submitted';
let expandedCards = new Set();

// -- SYNC - GitHub Gist -----------------------------------------
const EMD_SYNC_FILE = 'emdtrack-data.json';

function getSyncCfg(){
  try{ return JSON.parse(localStorage.getItem(SYNC_KEY)||'{}'); }catch(e){ return {}; }
}
function saveSyncCfg(cfg){ localStorage.setItem(SYNC_KEY, JSON.stringify(cfg)); }

function setSyncDot(state){
  const dot = document.getElementById('sync-dot');
  const btn  = document.getElementById('btn-sync');
  if(!dot||!btn) return;
  dot.className = 'sync-dot' + (state?' '+state:'');
  const cfg = getSyncCfg();
  btn.className = 'btn-sync' + (cfg.token&&state==='ok'?' ok':'');
}

async function gistReq(method, path, body){
  const cfg = getSyncCfg();
  if(!cfg.token) throw new Error('No token');
  const opts = {
    method: method,
    headers: {
      'Authorization': 'Bearer ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch('https://api.github.com' + path, opts);
  if(!res.ok){
    const err = await res.json().catch(function(){ return {}; });
    throw new Error((err.message || res.statusText) + ' (' + res.status + ')');
  }
  return res.status === 204 ? {} : res.json();
}

// ── Gist ID discovery ────────────────────────────────
async function findOrCreateGistId(){
  const cfg = getSyncCfg();
  if(!cfg.token) return null;
  if(cfg.gistId) return cfg.gistId;
  // Check TenderTrack's saved gistId (same Gist shared)
  try{
    const tt=JSON.parse(localStorage.getItem('tt_sync_cfg')||'{}');
    if(tt.gistId){ cfg.gistId=tt.gistId; saveSyncCfg(cfg); return cfg.gistId; }
  }catch(e){}
  // Search GitHub
  try{
    const r=await fetch('https://api.github.com/gists?per_page=50',{
      headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}
    });
    if(!r.ok) return null;
    const list=await r.json();
    const found=list.find(function(g){return g.files&&(g.files[EMD_SYNC_FILE]||g.files['tendertrack-data.json']);});
    if(found){ cfg.gistId=found.id; saveSyncCfg(cfg); return cfg.gistId; }
  }catch(e){ console.warn('findGist:',e); }
  return null;
}

// ── Push ──────────────────────────────────────────────
async function syncPush(silent){
  const cfg=getSyncCfg();
  if(!cfg.token){ if(!silent) toast('Set up sync first',true); return; }
  // No Gist yet — create one
  if(!cfg.gistId){
    setSyncDot('busy');
    try{
      const files={}; files[EMD_SYNC_FILE]={content:JSON.stringify(tenders)};
      const res=await gistReq('POST','/gists',{description:'TenderTrack+EMDTrack data',public:false,files:files});
      cfg.gistId=res.id; saveSyncCfg(cfg);
      localStorage.setItem('emd_last_sync',Date.now().toString());
      setSyncDot('ok'); if(!silent) toast('Pushed ✓');
    }catch(e){ setSyncDot('err'); if(!silent) toast('Push failed: '+e.message,true); }
    return;
  }
  // Merge-push
  setSyncDot('busy');
  try{
    const emdDeleted=JSON.parse(localStorage.getItem('emd_deleted')||'{}');
    const res=await gistReq('GET','/gists/'+cfg.gistId);
    const file=res.files&&res.files[EMD_SYNC_FILE];
    let remote=[];
    if(file){
      let raw=file.content;
      if(file.truncated){ const r2=await fetch(file.raw_url); raw=await r2.text(); }
      try{ const p=JSON.parse(raw); if(Array.isArray(p)) remote=p; }catch(e){}
    }
    // Merge: local always wins for existing tenders, keep remote-only
    const map={};
    remote.forEach(function(t){ if(!emdDeleted[t.id]) map[t.id]=t; });
    tenders.forEach(function(t){ if(!emdDeleted[t.id]) map[t.id]=t; });
    const merged=Object.values(map);
    tenders=merged; save(); render();
    const files2={}; files2[EMD_SYNC_FILE]={content:JSON.stringify(merged)};
    await gistReq('PATCH','/gists/'+cfg.gistId,{files:files2});
    localStorage.setItem('emd_last_sync',Date.now().toString());
    setSyncDot('ok'); if(!silent) toast('Synced ✓');
  }catch(e){ setSyncDot('err'); if(!silent) toast('Sync failed: '+e.message,true); console.warn(e); }
}

// ── Pull ──────────────────────────────────────────────
async function syncPull(silent){
  const cfg=getSyncCfg();
  if(!cfg.token) return;
  if(!cfg.gistId){ if(!silent) toast('Push first',true); return; }
  setSyncDot('busy');
  try{
    const res=await gistReq('GET','/gists/'+cfg.gistId);
    const file=res.files&&res.files[EMD_SYNC_FILE];
    if(!file){
      // EMD file not in Gist yet — push to create it
      setSyncDot('ok'); syncPush(silent); return;
    }
    let raw=file.content;
    if(file.truncated){ const r2=await fetch(file.raw_url); raw=await r2.text(); }
    const emdDeleted=JSON.parse(localStorage.getItem('emd_deleted')||'{}');
    let arr=[];
    try{ const p=JSON.parse(raw); if(Array.isArray(p)) arr=p; }catch(e){ throw new Error('Invalid data in Gist'); }
    const filtered=arr.filter(function(t){return !emdDeleted[t.id];});
    tenders=filtered; save(); render();
    localStorage.setItem('emd_last_sync',Date.now().toString());
    setSyncDot('ok'); if(!silent) toast('Pulled '+filtered.length+' entries ✓');
  }catch(e){ setSyncDot('err'); if(!silent) toast('Pull failed: '+e.message,true); console.warn(e); }
}


function exportData(){
  const blob = new Blob([JSON.stringify(tenders, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'emdtrack-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Exported ✓');
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.addEventListener('change', function(){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const arr = JSON.parse(ev.target.result);
        if(!Array.isArray(arr)) throw new Error('Not a valid export file');
        if(tenders.length > 0 && !confirm('Replace all ' + tenders.length + ' existing entries?')) return;
        tenders = arr; save(); render();
        toast('Imported ' + tenders.length + ' tenders ✓');
      } catch(err){ toast('Import failed: ' + err.message, true); }
    };
    reader.readAsText(file);
  });
  input.click();
}

function lastSyncText(){
  const ts = localStorage.getItem('emd_last_sync');
  if(!ts) return 'never';
  const diff = Math.round((Date.now()-parseInt(ts))/60000);
  if(diff < 1) return 'just now';
  if(diff < 60) return diff+'m ago';
  return Math.round(diff/60)+'h ago';
}

function openSync(){
  const cfg = getSyncCfg();
  const connected = !!(cfg.token);
  const body = document.getElementById('sync-body');
  let html = '';
  if(connected){
    // Check if TenderTrack has a gistId on this device
    let ttGistId = '';
    try{ ttGistId = (JSON.parse(localStorage.getItem('tt_sync_cfg')||'{}')).gistId || ''; }catch(e){}

    html =
      '<div class="sync-url-box">✓ Connected · Last sync: '+lastSyncText()+'</div>'+
      // Debug panel
      '<div style="background:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;font-family:var(--mono);color:var(--dim);line-height:1.8;">'+
        'Token: <b style="color:var(--text)">'+(cfg.token ? cfg.token.slice(0,12)+'…' : '❌ none')+'</b><br>'+
        'Gist ID: <b style="color:'+(cfg.gistId?'var(--green)':'var(--red)') +'">'+(cfg.gistId ? cfg.gistId.slice(0,20)+'…' : '❌ not set')+'</b><br>'+
        (ttGistId && !cfg.gistId ? '<span style="color:var(--yellow);">⚡ TenderTrack Gist found on this device: '+ttGistId.slice(0,16)+'…</span><br>' : '')+
        'Local entries: <b style="color:var(--text)">'+tenders.length+'</b>'+
      '</div>'+
      // If no gistId, show quick-fix options
      (!cfg.gistId ?
        '<div style="display:flex;gap:8px;margin-bottom:10px;">'+
          (ttGistId ? '<button class="btn-push" id="es-use-tt-gist" style="flex:1;">⚡ Use TenderTrack Gist</button>' : '')+
          '<button class="btn-pull" id="es-find-gist" style="flex:1;">🔍 Find Gist</button>'+
        '</div>'+
        '<div id="es-find-result" style="font-size:11px;font-family:var(--mono);color:var(--dim);min-height:14px;margin-bottom:8px;"></div>'
      : '')+
      '<div style="display:flex;gap:8px;margin-bottom:12px;">'+
        '<button class="btn-push" id="es-push">⬆ Push</button>'+
        '<button class="btn-pull" id="es-pull">⬇ Pull</button>'+
      '</div>'+
      '<div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:8px;">Export / Import</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:14px;"><button class="btn-push" id="es-export" style="background:var(--purple)">⬇ Export JSON</button><button class="btn-pull" id="es-import">⬆ Import JSON</button></div>'+
      '<div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:6px;">GitHub Token</div>'+
      '<input class="fi" id="es-token" type="password" value="'+cfg.token+'" style="font-size:13px;font-family:var(--mono);" autocomplete="off" spellcheck="false">';
  } else {
    html =
      '<a href="https://github.com/settings/tokens/new?scopes=gist&description=EMDTrack" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:16px;">🔗 Open GitHub Token Page →</a>'+
      '<div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;">Steps:</div><div style="font-size:12px;color:var(--dim);line-height:1.9;"><b style="color:var(--text)">1.</b> Token name = EMDTrack<br><b style="color:var(--text)">2.</b> Expiration → No expiration<br><b style="color:var(--text)">3.</b> Select scopes → tick only <b style="color:var(--text)">gist</b> ✓<br><b style="color:var(--text)">4.</b> Click Generate token → Copy it</div></div>'+
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:6px;">Paste token here</div>'+
      '<input class="fi" id="es-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="font-size:13px;font-family:var(--mono);margin-bottom:12px;" autocomplete="off" spellcheck="false">'+
      '<div style="font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:14px;">Tap Connect → Push. A private Gist is created automatically.</div>'+
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:8px;">Or skip — Export / Import</div>'+
      '<div style="display:flex;gap:8px;"><button class="btn-push" id="es-export" style="background:var(--purple)">⬇ Export JSON</button><button class="btn-pull" id="es-import">⬆ Import JSON</button></div>';
  }
  html += '<div style="display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">'+(connected?'<button id="es-disc" class="btn-c" style="margin-right:auto;color:var(--red);border-color:rgba(224,90,78,.3)">Disconnect</button>':'')+'<button class="btn-c" onclick="closeM(\'modal-sync\')">Cancel</button><button class="btn-s" id="es-connect">'+(connected?'Save Token':'Connect')+'</button></div>';
  body.innerHTML = html;
  function wire(id,fn){ const el=document.getElementById(id); if(el) el.addEventListener('click',fn); }
  wire('es-push',   function(){ closeM('modal-sync'); syncPush(false); });
  wire('es-pull',   function(){ closeM('modal-sync'); syncPull(); });

  // Use TenderTrack Gist directly
  wire('es-use-tt-gist', function(){
    try{
      const ttCfg = JSON.parse(localStorage.getItem('tt_sync_cfg')||'{}');
      if(ttCfg.gistId){
        const cfg = getSyncCfg(); cfg.gistId = ttCfg.gistId; saveSyncCfg(cfg);
        closeM('modal-sync'); toast('Gist ID set ✓'); syncPull();
      }
    } catch(e){ toast('Failed: '+e.message, true); }
  });

  // Search GitHub for the Gist
  wire('es-find-gist', async function(){
    const resultEl = document.getElementById('es-find-result');
    if(resultEl) resultEl.textContent = '⏳ Searching…';
    const gistId = await findOrCreateGistId();
    if(gistId){
      if(resultEl) resultEl.textContent = '✓ Found: '+gistId.slice(0,20)+'…';
      setTimeout(function(){ closeM('modal-sync'); syncPull(); }, 800);
    } else {
      if(resultEl){ resultEl.style.color='var(--yellow)'; resultEl.textContent = 'No Gist found — tap Push to create one'; }
    }
  });
  wire('es-export', exportData);
  wire('es-import', importData);
  wire('es-connect', function(){
    const inp=document.getElementById('es-token'); if(!inp) return;
    const token=inp.value.trim();
    if(!token){ toast('Enter your GitHub token',true); return; }
    if(!token.startsWith('ghp_')&&!token.startsWith('github_pat_')){ toast('Token should start with ghp_',true); return; }
    const old=getSyncCfg();
    const newCfg={token:token, gistId:token===old.token?(old.gistId||''):''};
    saveSyncCfg(newCfg); setSyncDot('ok'); closeM('modal-sync'); toast('Token saved ✓');
    findOrCreateGistId().then(function(gistId){
      if(gistId) syncPull(); else syncPush();
    });
  });
  wire('es-disc', function(){
    const btn=document.getElementById('es-disc'); if(!btn) return;
    if(btn.dataset.armed==='1'){ saveSyncCfg({}); localStorage.removeItem('emd_last_sync'); setSyncDot(''); closeM('modal-sync'); toast('Sync disconnected'); }
    else { btn.dataset.armed='1'; btn.textContent='Tap again to confirm'; setTimeout(function(){ if(btn){btn.dataset.armed='0';btn.textContent='Disconnect';}},2500); }
  });
  openM('modal-sync');
}

// ── HELPERS ───────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtAmount(n){
  if(!n && n!==0) return '—';
  const num = parseFloat(n);
  if(isNaN(num)) return '—';
  return '₹' + num.toLocaleString('en-IN');
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function statusLabel(s){
  if(s==='refund-pending')   return 'Refund Pending';
  if(s==='refund-requested') return 'Refund Requested';
  if(s==='refunded')         return 'Refunded';
  // Legacy migration: old 'submitted' → 'Refund Pending'
  if(s==='submitted') return 'Refund Pending';
  return s;
}
// Get latest entry for a tender (for summary display)
function latestEntry(t){
  if(!t.entries || !t.entries.length) return null;
  return t.entries[t.entries.length-1];
}
// Total active EMD amount (submitted + refund-pending)
function activeAmount(t){
  if(!t.entries) return 0;
  return t.entries.filter(e => e.status !== 'refunded').reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
}

// ── LOAD / SAVE ───────────────────────────────────────
function load(){
  try{ tenders = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ tenders=[]; }
  render();
}
function save(){ localStorage.setItem(KEY, JSON.stringify(tenders)); }

// ── FILTER ────────────────────────────────────────────
function setFilter(f){
  activeFilter = f;
  document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  render();
}

// ── RENDER ────────────────────────────────────────────
function render(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const list = document.getElementById('emd-list');

  // Filter tenders
  let filtered = tenders.filter(t => {
    if(q){
      const matchNo = t.no.toLowerCase().includes(q);
      const matchHandledBy = (t.handledBy||'').toLowerCase().includes(q);
      const matchEntry = (t.entries||[]).some(e =>
        (e.vendor||'').toLowerCase().includes(q) ||
        (e.notes||'').toLowerCase().includes(q) ||
        (e.amount||'').toString().includes(q)
      );
      if(!matchNo && !matchHandledBy && !matchEntry) return false;
    }
    if(activeFilter === 'all') return true;
    // Check if any entry matches the filter status
    return t.entries && t.entries.some(e => e.status === activeFilter);
  });

  // Stats
  let totalActive = 0, pendingCount = 0, submittedCount = 0, refundedCount = 0;
  tenders.forEach(t => {
    totalActive += activeAmount(t);
    if(t.entries) t.entries.forEach(e => {
      if(e.status==='refund-pending' || e.status==='submitted') pendingCount++; // submitted = legacy refund-pending
      if(e.status==='refund-requested') submittedCount++; // reuse submittedCount for refund-requested
      if(e.status==='refunded') refundedCount++;
    });
  });
  document.getElementById('s-total').textContent = tenders.length;
  document.getElementById('s-amount').textContent = fmtAmount(totalActive);
  document.getElementById('s-refund-pending').textContent = pendingCount;
  const rrEl = document.getElementById('s-refund-requested'); if(rrEl) rrEl.textContent = submittedCount;
  document.getElementById('s-refunded').textContent = refundedCount;

  if(!filtered.length){
    list.innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-title">'+(q?'No results':'No EMD records yet')+'</div><div class="empty-sub">'+(q?'Try a different search':'Tap + Add to add a tender')+'</div></div>';
    return;
  }

  list.innerHTML = filtered.map(t => {
    const le = latestEntry(t);
    const expanded = expandedCards.has(t.id);
    const entriesFiltered = activeFilter === 'all' ? (t.entries||[]) : (t.entries||[]).filter(e=>e.status===activeFilter);

    return `<div class="emd-card${expanded?' expanded':''}" id="card-${t.id}">
      <div class="emd-card-header" onclick="toggleCard('${t.id}')">
        <div style="flex:1;min-width:0;">
          <div class="emd-no">${esc(t.no)}</div>
          ${t.handledBy ? `<div style="font-size:10px;font-family:var(--mono);color:var(--accent);font-weight:600;margin-top:1px;">👤 ${esc(t.handledBy)}</div>` : ''}
            ${(t.entries&&t.entries.length)
            ? (() => {
                const vendors = [...new Set((t.entries).map(e=>e.vendor||'').filter(Boolean))];
                return `<div class="emd-vendor">${vendors.length ? vendors.map(v=>esc(v)).join(' · ') : '—'}</div>
                <div style="font-size:10px;font-family:var(--mono);color:var(--dim);margin-top:1px;">${t.entries.length} bidder${t.entries.length>1?'s':''}</div>`;
              })()
            : '<div class="emd-vendor" style="color:var(--dim);font-style:italic">No entries yet</div>'}
        </div>
        ${le ? `<div class="emd-amount">${fmtAmount(activeAmount(t))}</div>` : ''}
        ${le ? `<div class="emd-status ${le.status==='submitted'?'refund-pending':le.status}" style="display:none"></div>` : ''}
        <div class="emd-chevron">▾</div>
      </div>
      ${expanded ? `
      <div class="emd-history">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="emd-history-title" style="flex:1">EMD History (${entriesFiltered.length})</div>
          <div onclick="openEditTender('${t.id}')" style="font-size:10px;font-family:var(--mono);color:var(--dim);cursor:pointer;padding:2px 8px;border:1px solid var(--border2);border-radius:6px;">Edit No.</div>
          <div onclick="deleteTender('${t.id}')" style="font-size:10px;font-family:var(--mono);color:#f87171;cursor:pointer;padding:2px 8px;border:1px solid rgba(239,68,68,.3);border-radius:6px;">Delete</div>
        </div>
        ${entriesFiltered.map(e => `
          <div class="emd-entry" onclick="openEditEntry('${t.id}','${e.id}')">
            <div class="emd-entry-row">
              <div class="emd-entry-amount">${fmtAmount(e.amount)}</div>
              <div class="emd-status ${e.status==='submitted'?'refund-pending':e.status}" style="font-size:9px;padding:2px 8px;">${statusLabel(e.status)}</div>
              <div class="emd-entry-date">${fmtDate(e.date)}</div>
            </div>
            ${e.vendor ? `<div style="font-size:11px;font-family:var(--mono);color:var(--dim);">${esc(e.vendor)}</div>` : ''}
            ${e.refundRequestedOn ? `<div style="font-size:11px;font-family:var(--mono);color:var(--dim);">Refund requested: ${fmtDate(e.refundRequestedOn)}</div>` : ''}
            ${e.notes ? `<div class="emd-entry-notes">${esc(e.notes)}</div>` : ''}
          </div>`).join('')}
        ${entriesFiltered.length===0 ? '<div style="font-size:12px;color:var(--dim);padding:8px 0;">No entries match this filter</div>' : ''}
        <button class="emd-add-entry" onclick="openAddEntry('${t.id}')">＋ Add EMD Entry</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  render();
}

// ── TENDER MODAL ──────────────────────────────────────
function openAddTender(){
  editingTenderId = null;
  document.getElementById('tender-modal-title').textContent = 'Add Tender';
  document.getElementById('f-no').value = '';
  document.getElementById('f-handled-by-tender').value = '';
  openM('modal-tender');
  setTimeout(()=>document.getElementById('f-no').focus(),300);
}
function openEditTender(id){
  const t = tenders.find(x=>x.id===id);
  if(!t) return;
  editingTenderId = id;
  document.getElementById('tender-modal-title').textContent = 'Edit Tender';
  document.getElementById('f-no').value = t.no;
  document.getElementById('f-handled-by-tender').value = t.handledBy||'';
  openM('modal-tender');
}
function saveTender(){
  const no = document.getElementById('f-no').value.trim();
  const handledBy = document.getElementById('f-handled-by-tender').value.trim();
  if(!no){ toast('Enter tender number', true); return; }
  if(editingTenderId){
    const t = tenders.find(x=>x.id===editingTenderId);
    if(t){ t.no = no; t.handledBy = handledBy; }
  } else {
    tenders.push({id:uid(), no, handledBy, entries:[]});
  }
  save(); render(); closeM('modal-tender');
  toast(editingTenderId ? 'Tender updated ✓' : 'Tender added ✓');
  syncPush(true);
}
function deleteTender(id){
  const t = tenders.find(x=>x.id===id);
  if(!t) return;
  // Show inline confirmation inside the card
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const existing = card.querySelector('.del-confirm');
  if(existing){ existing.remove(); return; }
  const div = document.createElement('div');
  div.className = 'del-confirm';
  div.style.cssText = 'padding:10px 14px 12px;border-top:1px solid rgba(239,68,68,.25);display:flex;align-items:center;gap:10px;';
  div.innerHTML = `<span style="font-size:12px;color:#f87171;flex:1;font-family:var(--sans)">Delete "${t.no}" and all entries?</span>
    <button onclick="confirmDeleteTender('${id}')" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:6px 14px;color:#f87171;font-size:12px;font-weight:600;cursor:pointer;">Yes, Delete</button>
    <button onclick="this.parentNode.remove()" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--dim);font-size:12px;cursor:pointer;">Cancel</button>`;
  card.appendChild(div);
}
function confirmDeleteTender(id){
  tenders = tenders.filter(function(t){ return t.id!==id; });
  expandedCards.delete(id);
  try{
    const del = JSON.parse(localStorage.getItem('emd_deleted')||'{}');
    del[id] = Date.now();
    localStorage.setItem('emd_deleted', JSON.stringify(del));
  } catch(e){}
  save(); render();
  toast('Tender deleted');
  syncPush(true);
}

// ── ENTRY MODAL ───────────────────────────────────────
function openAddEntry(tenderId){
  editingEntryTenderId = tenderId;
  editingEntryId = null;
  document.getElementById('entry-modal-title').textContent = 'Add EMD Entry';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-vendor').value = '';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-refund-requested-on').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('entry-del-btn').style.display = 'none';
  selectStatus('refund-pending');
  openM('modal-entry');
  setTimeout(()=>document.getElementById('f-amount').focus(),300);
}
function openEditEntry(tenderId, entryId){
  const t = tenders.find(x=>x.id===tenderId);
  if(!t) return;
  const e = t.entries.find(x=>x.id===entryId);
  if(!e) return;
  editingEntryTenderId = tenderId;
  editingEntryId = entryId;
  document.getElementById('entry-modal-title').textContent = 'Edit EMD Entry';
  document.getElementById('f-amount').value = e.amount||'';
  document.getElementById('f-vendor').value = e.vendor||'';
  document.getElementById('f-date').value = e.date||'';
  document.getElementById('f-refund-requested-on').value = e.refundRequestedOn||'';
  document.getElementById('f-notes').value = e.notes||'';
  document.getElementById('entry-del-btn').style.display = '';
  // Migrate legacy 'submitted' → 'refund-pending'
  const migratedStatus = (e.status==='submitted') ? 'refund-pending' : (e.status||'refund-pending');
  selectStatus(migratedStatus);
  openM('modal-entry');
}
function selectStatus(val){
  selectedStatus = val;
  document.querySelectorAll('.sopt').forEach(el => {
    el.className = 'sopt' + (el.dataset.val===val ? ' active-'+val : '');
  });
}
function saveEntry(){
  const amount           = document.getElementById('f-amount').value.trim();
  const vendor           = document.getElementById('f-vendor').value.trim();
  const date             = document.getElementById('f-date').value;
  const refundRequestedOn= document.getElementById('f-refund-requested-on').value;
  const notes            = document.getElementById('f-notes').value.trim();
  if(!amount){ toast('Enter amount', true); return; }
  const t = tenders.find(x=>x.id===editingEntryTenderId);
  if(!t) return;
  if(editingEntryId){
    const e = t.entries.find(x=>x.id===editingEntryId);
    if(e){ e.amount=amount; e.vendor=vendor; e.date=date; e.refundRequestedOn=refundRequestedOn; e.status=selectedStatus; e.notes=notes; }
  } else {
    t.entries.push({id:uid(), amount, vendor, date, refundRequestedOn, status:selectedStatus, notes});
  }
  save(); render(); closeM('modal-entry');
  toast(editingEntryId ? 'Entry updated ✓' : 'EMD entry added ✓');
  syncPush(true);
}
function deleteEntry(){
  // Use a two-tap confirmation — first tap arms it, second tap fires
  const btn = document.getElementById('entry-del-btn');
  if(btn.dataset.armed === '1'){
    const t = tenders.find(x=>x.id===editingEntryTenderId);
    if(t) t.entries = t.entries.filter(e=>e.id!==editingEntryId);
    save(); render(); closeM('modal-entry');
    toast('Entry deleted');
    syncPush(true);
  } else {
    btn.dataset.armed = '1';
    btn.textContent = 'Tap again to confirm';
    setTimeout(()=>{ btn.dataset.armed='0'; btn.textContent='Delete'; }, 2500);
  }
}

// ── MODAL HELPERS ─────────────────────────────────────
function openM(id){ document.getElementById(id).classList.add('open'); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }

// ── TOAST ─────────────────────────────────────────────
let _tt; function toast(msg, err){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (err?' err':'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.className='toast',2800);
}

// ── SYNC ──────────────────────────────────────────────
// ── EXPORT TO EXCEL ───────────────────────────────────
function exportExcel(){
  if(!tenders.length){ toast('No data to export', true); return; }

  // Load SheetJS dynamically
  if(typeof XLSX === 'undefined'){
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => _doExport();
    s.onerror = () => { toast('Failed to load export library', true); };
    document.head.appendChild(s);
  } else {
    _doExport();
  }
}

function _doExport(){
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Summary (one row per tender, all vendors listed) ──
  const summaryData = [['Tender No','Handled By','No. of Bidders','Vendors (All)','Total EMD (₹)','Refund Pending','Refund Requested','Refunded']];
  tenders.forEach(t => {
    const entries = t.entries||[];
    const vendors = entries.map(e=>e.vendor||'—').join(', ');
    const pending   = entries.filter(e=>e.status==='refund-pending'||e.status==='submitted').length;
    const requested = entries.filter(e=>e.status==='refund-requested').length;
    const refunded  = entries.filter(e=>e.status==='refunded').length;
    const total     = entries.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    summaryData.push([t.no, t.handledBy||'', entries.length, vendors, total, pending, requested, refunded]);
  });
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
  wsSummary['!cols'] = [{wch:20},{wch:16},{wch:12},{wch:50},{wch:16},{wch:14},{wch:16},{wch:12}];

  // Style header row bold
  const headerStyle = {font:{bold:true}, fill:{fgColor:{rgb:'1E3A5F'}}, alignment:{horizontal:'center'}};
  const hdrKeys = ['A1','B1','C1','D1','E1','F1','G1','H1'];
  hdrKeys.forEach(k=>{ if(wsSummary[k]) wsSummary[k].s = headerStyle; });

  XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

  // ── Sheet 2: Details (one row per bidder entry) ──
  const detailData = [['Tender No','Handled By','Bidder / Vendor','Amount (₹)','Payment Date','Refund Requested On','Status','Notes']];
  tenders.forEach(t => {
    const entries = t.entries||[];
    if(!entries.length){
      detailData.push([t.no, t.handledBy||'', '', '', '', '', '', '']);
    } else {
      entries.forEach(e => {
        detailData.push([
          t.no,
          t.handledBy||'',
          e.vendor||'',
          parseFloat(e.amount)||0,
          e.date ? new Date(e.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '',
          e.refundRequestedOn ? new Date(e.refundRequestedOn).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '',
          statusLabel(e.status),
          e.notes||''
        ]);
      });
    }
  });
  const wsDetail = XLSX.utils.aoa_to_sheet(detailData);
  wsDetail['!cols'] = [{wch:20},{wch:16},{wch:28},{wch:14},{wch:14},{wch:18},{wch:18},{wch:30}];
  const dhdrKeys = ['A1','B1','C1','D1','E1','F1','G1','H1'];
  dhdrKeys.forEach(k=>{ if(wsDetail[k]) wsDetail[k].s = headerStyle; });

  // Color-code status cells
  const statusColors = {'Refund Pending':'BFD9FF','Refund Requested':'FFF0B3','Refunded':'B7F5D8'};
  const range = XLSX.utils.decode_range(wsDetail['!ref']||'A1');
  for(let R = range.s.r+1; R <= range.e.r; R++){
    const cell = wsDetail[XLSX.utils.encode_cell({r:R,c:6})]; // col G = Status
    if(cell && cell.v && statusColors[cell.v]){
      cell.s = {fill:{fgColor:{rgb:statusColors[cell.v]}},alignment:{horizontal:'center'}};
    }
  }

  XLSX.utils.book_append_sheet(wb, wsDetail, 'All Entries');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `EMDTrack-${date}.xlsx`);
  toast('Exported to Excel ✓');
}

// -- INIT -------------------------------------------------------
load();

// Immediately copy gistId from TenderTrack if EMD doesn't have one
(function(){
  try{
    const emdCfg = JSON.parse(localStorage.getItem('emd_sync_cfg')||'{}');
    if(emdCfg.token && !emdCfg.gistId){
      const ttCfg = JSON.parse(localStorage.getItem('tt_sync_cfg')||'{}');
      if(ttCfg.gistId){
        emdCfg.gistId = ttCfg.gistId;
        localStorage.setItem('emd_sync_cfg', JSON.stringify(emdCfg));
        console.log('EMD: copied gistId from TenderTrack:', ttCfg.gistId);
      }
    }
  } catch(e){}
})();

const _emdCfg = getSyncCfg();
setSyncDot(_emdCfg.token ? 'ok' : '');
if(_emdCfg.token){
  if(_emdCfg.gistId){
    syncPull(true);
  } else {
    findOrCreateGistId().then(function(gistId){
      if(gistId) syncPull(true);
    });
  }
}
